<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
  <!-- Stacked Waves: 3 undulating lines — flow, cable routing, signal -->
  <!-- Bottom wave -->
  <path d="M1.5,13 Q4,11 6,13 Q8,15 10,13 Q12,11 14.5,13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <!-- Middle wave -->
  <path d="M1.5,9 Q4,7 6,9 Q8,11 10,9 Q12,7 14.5,9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Top wave -->
  <path d="M1.5,5 Q4,3 6,5 Q8,7 10,5 Q12,3 14.5,5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="1"/>
</svg>
