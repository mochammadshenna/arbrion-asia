<svg width="200" height="100" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Ulir Dayak: Double Serpent (Naga) — two sinusoidal paths crossing at full diamonds.
    Canvas 200×100. Serpents cross at x=50, x=100, x=150.
    Serpent 1: M10,70 L50,30 L100,70 L150,30 L190,70
    Serpent 2: M10,30 L50,70 L100,30 L150,70 L190,30
    At each crossing (x=50 y=50, x=100 y=50, x=150 y=50) place a full enclosed diamond.
    Diamond at crossing: half-w=10, half-h=14.
    Cross1 (50,50): (50,36)(60,50)(50,64)(40,50)
    Cross2 (100,50): (100,36)(110,50)(100,64)(90,50)
    Cross3 (150,50): (150,36)(160,50)(150,64)(140,50)
    Inner diamonds (half=6): (50,44)(56,50)(50,56)(44,50) etc.
  -->
  <g opacity="0.7">
    <!-- Serpent 1 -->
    <path d="M10,70 L50,30 L100,70 L150,30 L190,70" stroke="#000000" stroke-miterlimit="10"/>
    <!-- Serpent 2 -->
    <path d="M10,30 L50,70 L100,30 L150,70 L190,30" stroke="#000000" stroke-miterlimit="10"/>
    <!-- Diamond at crossing 1 (x=50) -->
    <path d="M50,36 L62,50 L50,64 L38,50 Z" stroke="#000000" stroke-miterlimit="10"/>
    <path d="M50,43 L56,50 L50,57 L44,50 Z" stroke="#000000" stroke-miterlimit="10" opacity="0.5"/>
    <!-- Diamond at crossing 2 (x=100) -->
    <path d="M100,36 L112,50 L100,64 L88,50 Z" stroke="#000000" stroke-miterlimit="10"/>
    <path d="M100,43 L106,50 L100,57 L94,50 Z" stroke="#000000" stroke-miterlimit="10" opacity="0.5"/>
    <!-- Diamond at crossing 3 (x=150) -->
    <path d="M150,36 L162,50 L150,64 L138,50 Z" stroke="#000000" stroke-miterlimit="10"/>
    <path d="M150,43 L156,50 L150,57 L144,50 Z" stroke="#000000" stroke-miterlimit="10" opacity="0.5"/>
  </g>
</svg>
