  <!-- Middle ring arc -->
  <path d="M4.5,10.5 A5,5 0 0 1 11.5,10.5" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
  <!-- Inner ring arc -->
  <path d="M6,9 A3,3 0 0 1 10,9" fill="none" stroke="currentColor" stroke-width="1.5" opacity="1" stroke-linecap="round"/>
