<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
  <!-- Stacked Crosses (plus): 3 layered plus signs — connection nodes, junction points -->
  <!-- Bottom cross -->
  <path d="M6.5,14 L6.5,11.5 L4,11.5 L4,10 L6.5,10 L6.5,7.5 M9.5,7.5 L9.5,10 L12,10 L12,11.5 L9.5,11.5 L9.5,14 L6.5,14" opacity="0"/>
  <!-- Clean: 3 plus shapes stacked diagonally offset -->
  <!-- Bottom plus -->
  <rect x="9" y="10" width="5.5" height="1.5" rx="0.75" opacity="0.45"/>
  <rect x="11" y="8" width="1.5" height="5.5" rx="0.75" opacity="0.45"/>
  <!-- Middle plus -->
  <rect x="5" y="6.5" width="5.5" height="1.5" rx="0.75" opacity="0.7"/>
  <rect x="7" y="4.5" width="1.5" height="5.5" rx="0.75" opacity="0.7"/>
  <!-- Top plus -->
  <rect x="1" y="3" width="5.5" height="1.5" rx="0.75" opacity="1"/>
  <rect x="3" y="1" width="1.5" height="5.5" rx="0.75" opacity="1"/>
</svg>
