<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
  <!-- Nested Agents: 3 squares nested inside each other — containment, hierarchy -->
  <!-- Outer square -->
  <rect x="1.5" y="1.5" width="13" height="13" rx="1" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
  <!-- Middle square -->
  <rect x="4" y="4" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <!-- Inner square (filled) -->
  <rect x="6.5" y="6.5" width="3" height="3" rx="0.5" opacity="1"/>
</svg>
