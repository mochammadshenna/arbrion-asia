<svg width="120" height="160" viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Ulir Dayak: Paku Pakis (Fern) — geometric interpretation, NOT bezier curves.
    Vertical spine with symmetric paired frond-branches at 5 levels.
    Each frond = a V-bifurcation angled outward from spine, Dayak style.
    Spine: x=60, y=10 down to y=150.
    Frond pairs at y=30,55,80,105,130. Each frond: inner arm + outer arm.
    Left fronds lean left-down, right fronds mirror.
    Top tip: small diamond terminal.
  -->
  <g opacity="0.7">
    <!-- Spine -->
    <path d="M60,20 L60,150" stroke="#000000" stroke-miterlimit="10" opacity="0.3"/>
    <!-- Tip diamond -->
    <path d="M60,10 L68,20 L60,30 L52,20 Z" stroke="#000000" stroke-miterlimit="10"/>
    <!-- Frond level 1 (y=42) -->
    <path d="M60,42 L42,30 L28,34" stroke="#000000" stroke-miterlimit="10" opacity="0.9"/>
    <path d="M60,42 L78,30 L92,34" stroke="#000000" stroke-miterlimit="10" opacity="0.9"/>
    <!-- Frond level 2 (y=64) -->
    <path d="M60,64 L38,52 L22,58" stroke="#000000" stroke-miterlimit="10" opacity="0.75"/>
    <path d="M60,64 L82,52 L98,58" stroke="#000000" stroke-miterlimit="10" opacity="0.75"/>
    <!-- Frond level 3 (y=86) -->
    <path d="M60,86 L34,74 L16,82" stroke="#000000" stroke-miterlimit="10" opacity="0.6"/>
    <path d="M60,86 L86,74 L104,82" stroke="#000000" stroke-miterlimit="10" opacity="0.6"/>
    <!-- Frond level 4 (y=108) -->
    <path d="M60,108 L36,96 L18,106" stroke="#000000" stroke-miterlimit="10" opacity="0.45"/>
    <path d="M60,108 L84,96 L102,106" stroke="#000000" stroke-miterlimit="10" opacity="0.45"/>
    <!-- Frond level 5 (y=130) -->
    <path d="M60,130 L40,118 L24,130" stroke="#000000" stroke-miterlimit="10" opacity="0.3"/>
    <path d="M60,130 L80,118 L96,130" stroke="#000000" stroke-miterlimit="10" opacity="0.3"/>
    <!-- Base foot -->
    <path d="M60,150 L48,158 L60,150 L72,158" stroke="#000000" stroke-miterlimit="10" opacity="0.4"/>
  </g>
</svg>
