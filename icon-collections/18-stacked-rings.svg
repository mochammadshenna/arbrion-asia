<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
  <!-- Stacked Rings: 3 concentric oval layers — depth, orbit, scope -->
  <!-- Outer ellipse -->
  <ellipse cx="8" cy="10" rx="6.5" ry="3" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.45"/>
  <!-- Middle ellipse -->
  <ellipse cx="8" cy="7.5" rx="4.5" ry="2" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <!-- Inner ellipse -->
  <ellipse cx="8" cy="5.5" rx="2.5" ry="1.2" fill="none" stroke="currentColor" stroke-width="1.5" opacity="1"/>
  <!-- Top node -->
  <circle cx="8" cy="4" r="1.2" opacity="1"/>
</svg>
