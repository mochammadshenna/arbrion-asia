<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
  <!-- Iso Stack: 3 rhombus layers — isometric box faces, depth, product mass -->
  <!-- Bottom layer -->
  <polygon points="8,10.5 2,7.5 8,4.5 14,7.5" opacity="0.45"/>
  <!-- Middle layer -->
  <polygon points="8,7 2,4 8,1 14,4" opacity="0.7"/>
  <!-- Left side panel (depth illusion) -->
  <polygon points="2,4 8,1 8,4.5 2,7.5" opacity="0.55"/>
  <!-- Right side panel -->
  <polygon points="14,4 8,1 8,4.5 14,7.5" opacity="0.35"/>
  <!-- Bottom base line -->
  <rect x="2" y="13" width="12" height="1.5" rx="0.75" opacity="0.55"/>
  <!-- Connector lines -->
  <line x1="2" y1="7.5" x2="2" y2="13" stroke-width="1.5" opacity="0.4"/>
  <line x1="14" y1="7.5" x2="14" y2="13" stroke-width="1.5" opacity="0.4"/>
</svg>
